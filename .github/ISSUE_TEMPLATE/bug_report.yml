name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I tap "Add expense", the app...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Set income to...
        3. Add an expense...
        4. See error
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device type
      options:
        - Mobile (iOS Safari)
        - Mobile (Android Chrome)
        - Desktop (Chrome)
        - Desktop (Firefox)
        - Desktop (Safari)
        - Other
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: App URL
      description: Were you on spendable.netlify.app or running locally?
      placeholder: https://spendable.netlify.app

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, console errors, anything else useful.
